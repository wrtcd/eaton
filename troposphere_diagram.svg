<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="920" viewBox="0 0 1920 920" role="img" aria-labelledby="title desc">
  <title id="title">Troposphere: slant path and tropospheric column</title>
  <desc id="desc">The slant path is the diagonal satellite line of sight (cyan). The tropospheric column is the vertical integral (purple arrow), not the slant.</desc>

  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5FA0D8"/>
      <stop offset="100%" stop-color="#C8E0F5"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5A8F52"/>
      <stop offset="100%" stop-color="#3D6B38"/>
    </linearGradient>
    <linearGradient id="tropFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B0DDF5"/>
      <stop offset="100%" stop-color="#FFF6E0"/>
    </linearGradient>
    <!-- Slant path: diagonal satellite LOS (cyan / light blue) -->
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4DD0E1" stop-opacity="0.62"/>
      <stop offset="100%" stop-color="#B2EBF2" stop-opacity="0.38"/>
    </linearGradient>
    <filter id="cardShadow" x="-1%" y="-1%" width="102%" height="104%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1A3048" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1920" height="920" fill="url(#sky)"/>

  <path d="M0 760 Q 400 700 960 730 T 1920 755 L 1920 920 L 0 920 Z" fill="#4A7A42" opacity="0.88"/>
  <path d="M0 785 Q 480 745 960 765 T 1920 795 L 1920 920 L 0 920 Z" fill="url(#ground)"/>

  <!-- Trees -->
  <g fill="#2D5A28">
    <g transform="translate(100,0)"><rect x="120" y="828" width="4" height="40"/><ellipse cx="122" cy="812" rx="14" ry="18"/></g>
    <g transform="translate(240,3)"><rect x="120" y="830" width="4" height="38"/><ellipse cx="122" cy="814" rx="13" ry="17"/></g>
    <g transform="translate(400,0)"><rect x="120" y="826" width="4" height="42"/><ellipse cx="122" cy="810" rx="14" ry="18"/></g>
    <g transform="translate(560,4)"><rect x="120" y="832" width="4" height="36"/><ellipse cx="122" cy="816" rx="13" ry="17"/></g>
    <g transform="translate(720,0)"><rect x="120" y="828" width="4" height="40"/><ellipse cx="122" cy="812" rx="14" ry="18"/></g>
    <g transform="translate(900,2)"><rect x="120" y="829" width="4" height="39"/><ellipse cx="122" cy="813" rx="14" ry="18"/></g>
    <g transform="translate(1080,0)"><rect x="120" y="827" width="4" height="41"/><ellipse cx="122" cy="811" rx="14" ry="18"/></g>
    <g transform="translate(1240,3)"><rect x="120" y="831" width="4" height="37"/><ellipse cx="122" cy="815" rx="13" ry="17"/></g>
    <g transform="translate(1400,0)"><rect x="120" y="828" width="4" height="40"/><ellipse cx="122" cy="812" rx="14" ry="18"/></g>
    <g transform="translate(1560,2)"><rect x="120" y="830" width="4" height="38"/><ellipse cx="122" cy="814" rx="14" ry="18"/></g>
    <g transform="translate(1720,0)"><rect x="120" y="828" width="4" height="40"/><ellipse cx="122" cy="812" rx="14" ry="18"/></g>
  </g>

  <!-- Troposphere (wide box, reference style) -->
  <g filter="url(#cardShadow)">
    <rect x="120" y="100" width="1680" height="620" rx="4" ry="4" fill="url(#tropFill)" stroke="#1a1a1a" stroke-width="2.5"/>
  </g>

  <!-- Slant path: diagonal from satellite toward ground (NOT the vertical column) -->
  <polygon points="95,75 720,695 820,655 130,95" fill="url(#beam)" stroke="#00ACC1" stroke-width="2.8" stroke-opacity="0.95"/>

  <!-- Satellite -->
  <g transform="translate(58,40)">
    <rect x="0" y="10" width="34" height="14" rx="2" fill="#B8BCC4" stroke="#5A5F68" stroke-width="1"/>
    <rect x="-20" y="6" width="16" height="22" rx="1" fill="#4A8FD9" stroke="#2E6BB5" stroke-width="0.8"/>
    <rect x="38" y="6" width="16" height="22" rx="1" fill="#4A8FD9" stroke="#2E6BB5" stroke-width="0.8"/>
  </g>

  <!-- Clouds (three, inside box) -->
  <g fill="#FFFFFF" opacity="0.95">
    <ellipse cx="520" cy="260" rx="70" ry="26"/>
    <ellipse cx="460" cy="268" rx="48" ry="20"/>
    <ellipse cx="570" cy="272" rx="44" ry="18"/>
    <ellipse cx="960" cy="285" rx="68" ry="25"/>
    <ellipse cx="900" cy="292" rx="46" ry="20"/>
    <ellipse cx="1020" cy="288" rx="42" ry="18"/>
    <ellipse cx="1320" cy="255" rx="65" ry="24"/>
    <ellipse cx="1270" cy="262" rx="44" ry="19"/>
    <ellipse cx="1370" cy="268" rx="40" ry="17"/>
  </g>

  <!-- Left bracket + slant path label -->
  <path d="M 148 175 Q 128 175 128 195 L 128 320 Q 118 360 128 400 L 128 520 Q 118 560 128 600 L 128 680 Q 128 700 148 700"
        fill="none" stroke="#00838F" stroke-width="2.4" stroke-linecap="round"/>
  <text x="168" y="360" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#006064">
    <tspan x="168" dy="0">Slant path</tspan>
    <tspan x="168" dy="24">(what the instrument senses)</tspan>
  </text>

  <!-- Tropospheric column: vertical path (NOT the slant) — distinct purple -->
  <g id="vcd-arrow" stroke="#6A1B9A" stroke-width="3.2" fill="#6A1B9A">
    <line x1="1588" y1="155" x2="1588" y2="665"/>
    <polygon points="1588,145 1578,165 1598,165"/>
    <polygon points="1588,675 1578,655 1598,655"/>
  </g>
  <text x="1605" y="435" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#4A148C">Tropospheric column (NO&#x2082;)</text>

  <!-- AMF callout -->
  <g>
    <path d="M 1280 195 L 1520 195 Q 1540 195 1540 215 L 1540 285 Q 1540 305 1520 305 L 1320 305 Q 1300 305 1295 315 L 1285 335 L 1285 305 L 1280 305 Q 1260 305 1260 285 L 1260 215 Q 1260 195 1280 195 Z"
          fill="#F0F8FF" stroke="#4A90D9" stroke-width="2"/>
    <text x="1275" y="235" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#0F172A">
      <tspan x="1275" dy="0">AMF: converts slant information to</tspan>
      <tspan x="1275" dy="22">tropospheric column using</tspan>
      <tspan x="1275" dy="22">atmospheric profiles</tspan>
    </text>
  </g>

  <text x="960" y="145" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="600" fill="#1a1a1a">Troposphere</text>

</svg>
